<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Website 3 Fitur 🚀</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:Arial;background:#000;color:#fff;}
body{background:url('https://g.top4top.io/s_3730xihx71.jpg') no-repeat center center fixed;background-size:cover;}
#menu{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:20;}
#menu-title{font-size:2em;font-weight:bold;margin-bottom:20px;text-shadow:2px 2px 5px #000;}
button.feature-btn{display:block;margin:15px auto;padding:20px 40px;font-size:1.8em;border-radius:12px;border:none;background:#1e90ff;color:#fff;cursor:pointer;width:250px;}
#video,#canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:none;z-index:5;}
#status{position:absolute;top:60px;width:100%;text-align:center;font-size:2em;font-weight:bold;color:red;text-shadow:2px 2px 5px #000;z-index:10;}
#footer{position:absolute;bottom:10px;width:100%;text-align:center;font-size:1em;color:rgba(200,200,200,0.8);z-index:20;}
.social-link{color:#1e90ff;text-decoration:underline #1e90ff;font-weight:bold;}
#back-btn{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);padding:16px 32px;font-size:1.6em;border-radius:12px;border:none;background:#ff6347;color:#fff;cursor:pointer;display:none;z-index:20;}
</style>
</head>
<body>

<div id="menu">
  <div id="menu-title">3 FITUR YANG BERMANFAAT UNTUK KAMU</div>
  <button class="feature-btn" onclick="selectFeature('ngantuk')">Deteksi Ngantuk 👀</button>
  <button class="feature-btn" onclick="selectFeature('gigi')">Deteksi Warna Gigi 🦷</button>
  <button class="feature-btn" onclick="selectFeature('benda')">Deteksi Benda Sekitar 📦</button>
</div>

<button id="back-btn" onclick="backToMenu()">Kembali ➡️</button>

<div id="status">Pilih Fitur</div>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="footer">
  © OCIL<br>
  <a href="https://www.youtube.com/@ocilpandaboy" target="_blank" class="social-link">YouTube</a><br>
  <a href="https://www.tiktok.com/@ocilpandaboy" target="_blank" class="social-link">Tiktok</a><br>
  <a href="https://www.instagram.com/ocilpandaboy" target="_blank" class="social-link">Instagram</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.12.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
<script>
// Elemen & variabel
const video=document.getElementById('video');const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');const status=document.getElementById('status');const menu=document.getElementById('menu');const backBtn=document.getElementById('back-btn');
let camera=null,ttsActive=false,feature=null,lastSpokenObjects=new Set(),ngantukState="normal",ngantukTimer=null;

// Start kamera
async function startCamera(facingMode){
  if(camera){video.srcObject.getTracks().forEach(t=>t.stop());}
  video.style.display='block';canvas.style.display='block';menu.style.display='none';backBtn.style.display='block';
  const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facingMode}});
  video.srcObject=stream;
  video.onloadedmetadata=()=>{canvas.width=video.videoWidth;canvas.height=video.videoHeight;if(feature==='ngantuk') startNgantuk();if(feature==='gigi') startGigi();if(feature==='benda') startBenda();};
}

// Pilih fitur
function selectFeature(f){feature=f;stopAllTTS();ttsActive=false;status.innerText="Loading...";if(f==='ngantuk'||f==='gigi') startCamera('user');if(f==='benda') startCamera({exact:'environment'});}

// Kembali
function backToMenu(){stopAllTTS();if(camera){video.srcObject.getTracks().forEach(t=>t.stop());camera=null;}video.style.display='none';canvas.style.display='none';menu.style.display='block';backBtn.style.display='none';status.innerText="Pilih Fitur";ngantukState="normal";clearTimeout(ngantukTimer);}

// Stop TTS
function stopAllTTS(){ttsActive=false;speechSynthesis.cancel();lastSpokenObjects.clear();}

// ===== Deteksi Gigi =====
function startGigi(){
  ttsActive=false;
  function detectGigi(){
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    status.innerText="Mendeteksi Gigi 🦷";
    let gigiDetected=false;
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    let rTotal=0,gTotal=0,bTotal=0,count=0;
    for(let i=canvas.width*0.4|0;i<canvas.width*0.6|0;i++){for(let j=canvas.height*0.3|0;j<canvas.height*0.5|0;j++){const idx=(j*canvas.width+i)*4;rTotal+=img.data[idx];gTotal+=img.data[idx+1];bTotal+=img.data[idx+2];count++;}}
    if(count>0){gigiDetected=true;const r=rTotal/count,g=gTotal/count,b=bTotal/count;const brightness=(r+g+b)/3;let color="Putih";if(brightness<80)color="Hitam";else if(r>200&&g>180&&b>150)color="Kuning";status.innerText=`Gigi Anda Berwarna ${color}`;if(!ttsActive){let msg=`Gigi Anda berwarna ${color}`;if(color==="Kuning"||color==="Hitam")msg=`Gigi kamu berwarna ${color}, rajin-rajin sikat gigi yaa`;const s=new SpeechSynthesisUtterance(msg);s.lang="id-ID";speechSynthesis.speak(s);ttsActive=true;}}else{status.innerText="Gigi Tidak Terdeteksi ❌";if(!ttsActive){const s=new SpeechSynthesisUtterance("Gigi Tidak Terdeteksi ❌");s.lang="id-ID";speechSynthesis.speak(s);ttsActive=true;}}
    requestAnimationFrame(detectGigi);
  }
  detectGigi();
}

// ===== Deteksi Ngantuk (dummy) =====
function startNgantuk(){status.innerText="Fitur Ngantuk Aktif";}

// ===== Deteksi Benda (dummy) =====
function startBenda(){status.innerText="Fitur Benda Aktif";}
</script>
</body>
</html>
