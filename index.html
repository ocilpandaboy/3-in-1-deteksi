<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Website 3 Fitur 🚀</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:Arial;background:#000;color:#fff;transition:background-color 0.3s;}
body{background:url('https://g.top4top.io/s_3730xihx71.jpg') no-repeat center center fixed;background-size:cover;}
#menu{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:20;}
#menu-title{font-size:2.5em;font-weight:bold;margin-bottom:30px;text-shadow:2px 2px 5px #000;}
button.feature-btn{display:block;margin:20px auto;padding:25px 50px;font-size:2em;border-radius:12px;border:none;background:#1e90ff;color:#fff;cursor:pointer;width:280px;}
#video,#canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:none;z-index:5;}
#status{position:absolute;top:0;left:0;width:100%;height:100%;text-align:center;font-size:4em;font-weight:bold;color:red;text-shadow:3px 3px 10px #000;display:none;line-height:1.2;padding-top:30%;z-index:10;}
#footer{position:absolute;bottom:10px;width:100%;text-align:center;font-size:1em;color:rgba(200,200,200,0.8);z-index:20;}
.social-link{color:#1e90ff;text-decoration:underline #1e90ff;font-weight:bold;}
#back-btn{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);padding:16px 32px;font-size:1.6em;border-radius:12px;border:none;background:#ff6347;color:#fff;cursor:pointer;display:none;z-index:20;}
</style>
</head>
<body>

<div id="menu">
  <div id="menu-title">3 FITUR YANG BERMANFAAT UNTUK KAMU</div>
  <button class="feature-btn" onclick="selectFeature('ngantuk')">Deteksi Ngantuk 👀</button>
  <button class="feature-btn" onclick="selectFeature('gigi')">Deteksi Warna Gigi 🦷</button>
  <button class="feature-btn" onclick="selectFeature('benda')">Deteksi Benda Sekitar 📦</button>
</div>

<button id="back-btn" onclick="backToMenu()">Kembali ➡️</button>
<div id="status"></div>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="footer">
  © OCIL<br>
  <a href="https://www.youtube.com/@ocilpandaboy" target="_blank" class="social-link">YouTube</a><br>
  <a href="https://www.tiktok.com/@ocilpandaboy" target="_blank" class="social-link">Tiktok</a><br>
  <a href="https://www.instagram.com/ocilpandaboy" target="_blank" class="social-link">Instagram</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.12.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const status=document.getElementById('status');
const menu=document.getElementById('menu');
const backBtn=document.getElementById('back-btn');
const footer=document.getElementById('footer');

let feature=null,lastText="",cameraStream=null,modelBenda=null;
let lastSpokenObjects=new Set();
let alarmInterval=null,alarmActive=false;

async function startCamera(facingMode){
  stopAllFeatures();
  video.style.display='block'; canvas.style.display='block'; menu.style.display='none'; backBtn.style.display='block'; status.style.display='block';
  footer.style.display='none';
  cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facingMode}});
  video.srcObject=cameraStream;
  video.onloadedmetadata=()=>{
    canvas.width=video.videoWidth; canvas.height=video.videoHeight;
    if(feature==='ngantuk') startNgantuk();
    if(feature==='gigi') startGigi();
    if(feature==='benda') startBenda();
  };
}

function selectFeature(f){
  feature=f; lastText=""; lastSpokenObjects.clear();
  startCamera(f==='benda'?{exact:'environment'}:'user');
}

function backToMenu(){
  stopAllFeatures();
  if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop()); cameraStream=null;}
  video.style.display='none'; canvas.style.display='none';
  menu.style.display='block'; backBtn.style.display='none';
  status.style.display='none'; status.innerText='';
  footer.style.display='block';
  stopAlarm();
  feature=null; lastSpokenObjects.clear();
}

function stopAllFeatures(){lastText=""; cancelAnimationFrame(window.featureLoop); speechSynthesis.cancel(); alarmActive=false;}
function speakOnce(text){if(text!==lastText){const utter=new SpeechSynthesisUtterance(text);utter.lang="id-ID";speechSynthesis.speak(utter);lastText=text;}}
function speakObject(objName){if(!lastSpokenObjects.has(objName)){const utter=new SpeechSynthesisUtterance(objName);utter.lang="id-ID";speechSynthesis.speak(utter);lastSpokenObjects.add(objName);}}

// Alarm visual & controlled TTS
function txtAlarm(){
  if(!alarmActive){
    alarmActive=true;
    const utter=new SpeechSynthesisUtterance("Jangan Tidur Anda Sedang Berkendara‼️");
    utter.lang="id-ID"; speechSynthesis.speak(utter);
    alarmInterval=setInterval(()=>{
      document.body.style.backgroundColor=document.body.style.backgroundColor==='rgba(255,0,0,0.2)'?'#000':'rgba(255,0,0,0.2)';
    },1500);
  }
}
function stopAlarm(){if(alarmInterval){clearInterval(alarmInterval);alarmInterval=null;alarmActive=false;document.body.style.backgroundColor='#000';}}

// Deteksi Gigi
function startGigi(){
  function detectGigi(){
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    const startX=canvas.width*0.4|0, startY=canvas.height*0.4|0, endX=canvas.width*0.6|0, endY=canvas.height*0.6|0;
    const img=ctx.getImageData(startX,startY,endX-startX,endY-startY);
    let rTotal=0,gTotal=0,bTotal=0,count=0;
    for(let i=0;i<img.data.length;i+=4){rTotal+=img.data[i]; gTotal+=img.data[i+1]; bTotal+=img.data[i+2]; count++;}
    if(count>0){
      const r=rTotal/count,g=gTotal/count,b=bTotal/count; const brightness=(r+g+b)/3;
      let color="Putih"; 
      if(brightness<80)color="Hitam"; else if(r>200&&g>180&&b>150)color="Kuning";
      let text="Gigi Tidak Terdeteksi ❌";
      if(brightness>50){text=`Gigi Anda Berwarna ${color}`; speakOnce((color==="Kuning"||color==="Hitam")?`Gigi kamu berwarna ${color}, rajin-rajin sikat gigi yaa`:text);}
      status.innerText=text;
    } else {status.innerText="Gigi Tidak Terdeteksi ❌"; speakOnce(status.innerText);}
    window.featureLoop=requestAnimationFrame(detectGigi);
  }
  detectGigi();
}

// Deteksi Ngantuk
async function startNgantuk(){
  const earHistory=[];
  const faceMesh=new FaceMesh({locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
  faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.7,minTrackingConfidence:0.7});
  faceMesh.onResults(onResultsNgantuk);
  const cameraFace=new Camera(video,{onFrame:async()=>{await faceMesh.send({image:video})},width:640,height:480});
  cameraFace.start();

  function calculateEAR(landmarks){
    const eyeIndices={left:[33,160,158,133,153,144],right:[362,385,387,263,380,373]};
    function earFor(pts){const a=Math.hypot(landmarks[pts[1]].x-landmarks[pts[5]].x,landmarks[pts[1]].y-landmarks[pts[5]].y);const b=Math.hypot(landmarks[pts[2]].x-landmarks[pts[4]].x,landmarks[pts[2]].y-landmarks[pts[4]].y);const c=Math.hypot(landmarks[pts[0]].x-landmarks[pts[3]].x,landmarks[pts[0]].y-landmarks[pts[3]].y);return(a+b)/(2*c);}
    return (earFor(eyeIndices.left)+earFor(eyeIndices.right))/2;
  }

  function onResultsNgantuk(results){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    if(results.multiFaceLandmarks.length>0){
      const landmarks=results.multiFaceLandmarks[0];
      const ear=calculateEAR(landmarks);
      earHistory.push(ear); if(earHistory.length>20)earHistory.shift();
      const avgEAR=earHistory.reduce((a,b)=>a+b,0)/earHistory.length;
      const THRESH_NORMAL=0.30, THRESH_NGANTUK=0.27, THRESH_TIDUR=0.23;
      let txt="";
      if(avgEAR>THRESH_NORMAL){txt="Normal ✅"; stopAlarm();}
      else if(avgEAR>THRESH_NGANTUK){txt="Terdeksi Ngantuk‼️"; stopAlarm();}
      else if(avgEAR>THRESH_TIDUR){txt="Terdeksi Tidur ⚠️"; txtAlarm();}
      else{txt="Darurat Kecelakaan ☠️"; txtAlarm();}
      status.innerText=txt; if(txt==="Normal ✅" || txt==="Terdeksi Ngantuk‼️") speakOnce(txt);
    } else{status.innerText="Wajah Tidak Terdeteksi ❌"; speakOnce(status.innerText); stopAlarm();}
  }
}

// Deteksi Benda
async function startBenda(){
  status.innerText="Mendeteksi Benda 📦"; speakOnce(status.innerText);
  if(!modelBenda) modelBenda=await cocoSsd.load();
  async function detectBenda(){
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    const predictions=await modelBenda.detect(video);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    predictions.forEach(pred=>{
      ctx.strokeStyle="red"; ctx.lineWidth=3; ctx.strokeRect(pred.bbox[0],pred.bbox[1],pred.bbox[2],pred.bbox[3]);
      ctx.fillStyle="red"; ctx.font="20px Arial"; ctx.fillText(pred.class,pred.bbox[0],pred.bbox[1]-5);
      speakObject(pred.class);
    });
    window.featureLoop=requestAnimationFrame(detectBenda);
  }
  detectBenda();
}
</script>
</body>
  </html>
